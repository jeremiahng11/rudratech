server {
    # Coolify routes the edge (80/443) to this port and health-checks it
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text payloads (the embedded PNG is already binary)
    gzip on;
    gzip_min_length 1024;
    gzip_types text/css text/javascript application/javascript image/svg+xml application/json;

    # Lightweight health endpoint for Coolify's healthcheck
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Single-page: always fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
